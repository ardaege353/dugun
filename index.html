<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oylama Sistemi</title>

<style>
:root{
  --bg:#0f172a; --card:rgba(255,255,255,0.08);
  --text:#fff; --accent:#6366f1;
  --yes:#22c55e; --no:#ef4444;
}
body{
  margin:0; font-family:'Segoe UI',sans-serif;
  background:var(--bg); color:var(--text);
}
.page{display:none; justify-content:center; align-items:center; height:100vh;}
.page.active{display:flex;}
.card{
  background: var(--card);
  border-radius:15px;
  padding:30px;
  width:90%; max-width:400px;
  text-align:center;
}
input{
  width:100%; padding:12px; margin:8px 0;
  border-radius:10px; border:none;
}
button{
  padding:12px; margin:5px;
  border:none; border-radius:10px;
  cursor:pointer; color:white;
}
.btn{background:#6366f1;}
.yes{background:#22c55e;}
.no{background:#ef4444;}
.delete{background:red;}
</style>
</head>

<body>

<!-- HOME -->
<div class="page active" id="home">
  <div class="card">
    <h2>Düğünde Bizimlemisin?</h2>

    <input id="name" placeholder="Ad Soyad">

    <label>
      <input type="checkbox" id="familyCheck">
      Ailemle geliyorum
    </label>

    <div id="familyBox" style="display:none;">
      <div id="familyMembers"></div>
      <button class="btn" onclick="addFamilyMember()">+ Kişi Ekle</button>
    </div>

    <button class="btn" onclick="start()">Devam</button>
  </div>
</div>

<!-- VOTE -->
<div class="page" id="vote">
  <div class="card">
    <h2>Katılıyor musunuz?</h2>
    <button class="yes" onclick="vote('evet')">Evet</button>
    <button class="no" onclick="vote('hayir')">Hayır</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "API_KEY",
  databaseURL: "DATABASE_URL"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = "";
let familyList = [];

// checkbox kontrol
document.getElementById("familyCheck").addEventListener("change", function(){
  document.getElementById("familyBox").style.display = this.checked ? "block" : "none";
});

// aile üyesi ekleme
function addFamilyMember(){
  const div = document.createElement("div");
  div.style.display="flex";

  div.innerHTML = `
    <input placeholder="Ad Soyad">
    <button class="delete" onclick="this.parentElement.remove()">X</button>
  `;

  document.getElementById("familyMembers").appendChild(div);
}

// sayfa geçiş
function goPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// başlat
function start(){
  let n = document.getElementById("name").value.trim().toLowerCase().replace(/\s+/g,'');

  if(!n) return alert("Ad gir!");

  familyList = [n];

  if(document.getElementById("familyCheck").checked){
    document.querySelectorAll("#familyMembers input").forEach(i=>{
      let val = i.value.trim().toLowerCase().replace(/\s+/g,'');
      if(val) familyList.push(val);
    });
  }

  currentUser = n;
  goPage("vote");
}

// oy verme
function vote(choice){
  if(!currentUser) return;

  const now = new Date().toLocaleString("tr-TR");

  familyList.forEach(person=>{
    const userId = "user_" + person;

    db.ref("votes/"+userId).set({
      name: person,
      choice,
      time: now
    });
  });

  alert("Oylar kaydedildi ✅");
}
</script>

</body>
</html>
