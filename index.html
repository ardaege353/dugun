<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oylama Sistemi</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:400px;
  margin:50px auto;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
}

.yes{background:#22c55e;}
.no{background:#ef4444;}
.btn{background:#6366f1;}

.hidden{display:none;}

.member{
  display:flex;
  gap:5px;
}
</style>
</head>

<body>

<div class="card" id="home">
  <h2>Düğünde Bizimle misin?</h2>

  <input id="name" placeholder="Ad Soyad">

  <label>
    <input type="checkbox" id="familyCheck">
    Ailemle geliyorum
  </label>

  <div id="familyBox" class="hidden">
    <h4>Aile Üyeleri</h4>
    <div id="members"></div>
    <button onclick="addMember()">+ Kişi Ekle</button>
  </div>

  <button class="btn" onclick="start()">Devam</button>
</div>

<div class="card hidden" id="vote">
  <h2>Katılıyor musunuz?</h2>
  <button class="yes" onclick="voteAll('evet')">Evet</button>
  <button class="no" onclick="voteAll('hayir')">Hayır</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "API_KEY",
  databaseURL: "DATABASE_URL"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let people = [];

// checkbox kontrol
document.getElementById("familyCheck").addEventListener("change", e=>{
  document.getElementById("familyBox").classList.toggle("hidden", !e.target.checked);
});

// kişi ekleme
function addMember(){
  const div = document.createElement("div");
  div.classList.add("member");

  div.innerHTML = `
    <input placeholder="Ad Soyad">
    <button onclick="this.parentElement.remove()">X</button>
  `;

  document.getElementById("members").appendChild(div);
}

// başlat
function start(){
  let mainName = document.getElementById("name").value.trim();
  if(!mainName) return alert("Ad gir!");

  people = [mainName];

  if(document.getElementById("familyCheck").checked){
    document.querySelectorAll("#members input").forEach(i=>{
      if(i.value.trim()){
        people.push(i.value.trim());
      }
    });
  }

  document.getElementById("home").classList.add("hidden");
  document.getElementById("vote").classList.remove("hidden");
}

// oy ver
function voteAll(choice){

  if(localStorage.getItem("voted")){
    alert("Zaten oy verdiniz!");
    return;
  }

  const now = new Date().toLocaleString("tr-TR");

  people.forEach(name=>{
    const id = "user_" + name.toLowerCase().replace(/\s/g,"");

    db.ref("votes/"+id).set({
      name,
      choice,
      time: now
    });
  });

  localStorage.setItem("voted", "true");

  alert("Oylar kaydedildi ❤️");

  document.getElementById("vote").innerHTML = "<h2>Teşekkür ederiz 💖</h2>";
}
</script>

</body>
</html>
