sayfamızın kodları bunlar              <!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oylama Sistemi</title>
<style>
:root{
  --bg:#0f172a; --card:rgba(255,255,255,0.08);
  --text:#fff; --accent:#6366f1;
  --yes:#22c55e; --no:#ef4444;
}
body{
  margin:0; font-family:'Segoe UI',sans-serif;
  background:var(--bg); color:var(--text);
  cursor:none;
}

/* Developer yazısı */
.dev-top{
  position:fixed; top:10px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.6); /* saydamlık eklendi */
  font-size:32px; font-weight:600;
  pointer-events:none; z-index:10;
}
@media(max-width:480px){
  .dev-top{
    font-size:18px; /* mobilde küçültüldü */
    color:rgba(255,255,255,0.5); /* daha saydam */
  }
}

#cursor{
  position: fixed; top:0; left:0; width:16px; height:16px;
  border-radius:50%; pointer-events:none;
  background: linear-gradient(45deg,#6366f1,#22c55e,#ef4444);
  box-shadow:0 0 6px #6366f1,0 0 12px #22c55e,0 0 18px #ef4444;
  transform:translate(-50%,-50%); z-index:9999;
  transition:transform 0.1s ease;
}

/* Sayfa containerları */
.page{
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; justify-content:center; align-items:center;
  opacity:0; pointer-events:none; transition:opacity 0.3s ease;
}
.page.active{
  opacity:1; pointer-events:auto;
}
.card{
  background: var(--card); backdrop-filter: blur(20px); border-radius:15px;
  padding:30px; width:90%; max-width:400px; text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}
.input-container{position:relative; margin:15px 0;}
input{ width:100%; padding:14px 12px; border-radius:10px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.6); color:white; outline:none; backdrop-filter:blur(10px); font-size:16px; min-height:44px;}
input:focus{ border:1px solid #fff; box-shadow:0 0 15px rgba(255,255,255,0.6);}
input::placeholder{ color:transparent; }
label{ position:absolute; top:50%; left:12px; transform:translateY(-50%); color:rgba(255,255,255,0.7); pointer-events:none; transition:0.3s;}
input:focus + label, input:not(:placeholder-shown) + label{ top:-8px; left:8px; font-size:12px; color:white; background:rgba(0,0,0,0.3); padding:0 5px; border-radius:5px;}
button{ padding:12px 18px; margin:5px; border:none; border-radius:10px; cursor:pointer; color:white; font-weight:600; min-height:44px;}
button:hover{ transform:scale(1.05);}
button:active{ transform:scale(0.95);}
.btn{background:var(--accent);} .yes{background:var(--yes);} .no{background:var(--no);}
.back{background:#888;} .delete{background:var(--no); margin-left:5px;}
#adminBtn{position:absolute; top:15px; right:15px; background:rgba(255,255,255,0.2); padding:10px 14px; border-radius:10px; cursor:pointer; z-index:2; font-size:16px;}
#adminBtn:hover{transform:scale(1.1);}

/* Dashboard */
.dashboard-container{
  display:flex; flex-direction:column; max-height:95vh; overflow:hidden; border-radius:15px; background:rgba(255,255,255,0.05); backdrop-filter:blur(20px);
}
.sidebar{
  width:100%; display:flex; flex-direction:row; flex-wrap:wrap; overflow-x:auto; background:rgba(0,0,0,0.25); color:white;
}
.sidebar-header{padding:15px; border-bottom:1px solid rgba(255,255,255,0.2);}
.sidebar-menu{list-style:none; padding:0; margin:0; display:flex; flex-wrap:wrap;}
.sidebar-menu li{padding:12px 15px; cursor:pointer; min-width:120px; border-right:1px solid rgba(255,255,255,0.1);}
.sidebar-menu li:hover{background:rgba(255,255,255,0.1);}
.admin-main{
  flex:1; padding:15px; overflow-y:auto; -webkit-overflow-scrolling:touch; max-height:80vh;
}
.admin-section{display:none;}
.admin-section.active{display:block;}
.cards{display:flex; gap:15px; margin-bottom:15px; flex-wrap:wrap;}
.stat-card{flex:1; min-width:120px; background:rgba(255,255,255,0.1); padding:15px; border-radius:15px; text-align:center; font-size:16px;}
#userList{list-style:none; padding:0; font-size:16px;}
.user-item{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
.user-item span.time{font-size:12px; color:rgba(255,255,255,0.5); margin-left:10px;}
#searchUser{padding:12px; width:100%; margin-bottom:10px; border-radius:10px; border:none; outline:none; background:rgba(255,255,255,0.1); color:white; font-size:16px;}

/* Mobil */
@media(max-width:480px){
  .card{width:95%; padding:20px;}
}
</style>
</head>
<body>
<div class="dev-top">Developer by: Arda Umul</div>
<div id="cursor"></div>
<button id="adminBtn" onclick="goPage('adminLogin')">Admin</button>

<!-- HOME -->
<div class="page active" id="home">
  <div class="card">
    <h2>Düğünde Bizimlemisin?</h2>
    <div class="input-container">
      <input id="name" placeholder=" " type="text">
      <label>Ad Soyad</label>
    </div>
    <button class="btn" id="startBtn">Devam</button>
  </div>
</div>

<!-- VOTE -->
<div class="page" id="vote">
  <div class="card">
    <h2>Düğünde Bizimlemisin?</h2>
    <button class="yes" id="voteYes">Evet</button>
    <button class="no" id="voteNo">Hayır</button>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div class="page" id="adminLogin">
  <div class="card">
    <h2>Admin Giriş</h2>
    <div class="input-container"><input id="user" placeholder=" "><label>Kullanıcı adı</label></div>
    <div class="input-container"><input id="pass" type="password" placeholder=" "><label>Şifre</label></div>
    <button class="btn" onclick="login()">Giriş</button>
    <button class="back" onclick="goPage('home')">Geri</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="page" id="admin">
  <div class="dashboard-container">
    <div class="sidebar">
      <div class="sidebar-header"><h2>Admin Panel</h2></div>
      <ul class="sidebar-menu">
        <li onclick="showAdminSection('stats')">📊 İstatistik</li>
        <li onclick="showAdminSection('users')">👥 Kullanıcılar</li>
        <li onclick="goPage('home')">🚪 Çıkış</li>
      </ul>
    </div>
    <div class="admin-main">
      <div id="stats" class="admin-section active">
        <div class="cards">
          <div class="stat-card"><h3>Evet</h3><p id="evetCount">0</p></div>
          <div class="stat-card"><h3>Hayır</h3><p id="hayirCount">0</p></div>
        </div>
        <canvas id="voteChart" style="max-height:300px;"></canvas>
      </div>
      <div id="users" class="admin-section">
        <input type="text" id="searchUser" placeholder="Kullanıcı ara..." onkeyup="filterUsers()">
        <ul id="userList"></ul>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyB2TOt0nKS1jhl6Pwi8hx_YZURHsoS9CkI",
  authDomain: "liefwexe.firebaseapp.com",
  databaseURL: "https://liefwexe-default-rtdb.firebaseio.com",
  projectId: "liefwexe",
  storageBucket: "liefwexe.firebasestorage.app",
  messagingSenderId: "423376553462",
  appId: "1:423376553462:web:ec4c5b28a559afb813f3d7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = "";

function goPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// Start button dokunmatik uyumlu
const startBtn = document.getElementById('startBtn');
startBtn.addEventListener('click', start);
startBtn.addEventListener('touchstart', start);

function start(){
  let n = (document.getElementById("name").value || "").trim().toLowerCase().replace(/\s+/g,'');
  if(!n) return alert("Lütfen adınızı girin!");
  currentUser = n;
  goPage("vote");
}

// Oy butonları dokunmatik uyumlu
const voteYes = document.getElementById('voteYes');
const voteNo = document.getElementById('voteNo');
voteYes.addEventListener('click', ()=>vote('evet'));
voteYes.addEventListener('touchstart', ()=>vote('evet'));
voteNo.addEventListener('click', ()=>vote('hayir'));
voteNo.addEventListener('touchstart', ()=>vote('hayir'));

function vote(choice){
  if(!currentUser) return;
  const userId = 'user_' + currentUser;
  const now = new Date().toLocaleString("tr-TR");
  db.ref('votes/'+userId).set({name:currentUser, choice, time: now})
  .then(()=>{
    alert("Oy kaydedildi! ✅");
    if(document.getElementById("admin").classList.contains("active")){
      loadAdminData();
    }
  });
}

function login(){ 
  const admins = [
    {user: "arda", pass: "arda35"},
    {user: "erkan", pass: "erkan35"},
    {user: "halise", pass: "halise35"}
  ];

  const enteredUser = user.value;
  const enteredPass = pass.value;
  const found = admins.find(a => a.user === enteredUser && a.pass === enteredPass);

  if(found){ 
    goPage("admin"); 
    document.getElementById("admin").classList.add("active");
    loadAdminData(); 
  } else alert("Hatalı giriş!"); 
}

function showAdminSection(id){document.querySelectorAll(".admin-section").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}

let userListEl=document.getElementById("userList");
let evetCountEl=document.getElementById("evetCount");
let hayirCountEl=document.getElementById("hayirCount");
let voteChart;

function loadAdminData(){
  const votesRef = db.ref('votes');
  votesRef.on('value', snapshot => {
    const data = snapshot.val() || {};
    userListEl.innerHTML = "";
    let evet = 0, hayir = 0;
    Object.keys(data).forEach(k => {
      const u = data[k];
      if(u.choice === 'evet') evet++;
      else if(u.choice === 'hayir') hayir++;
      const li = document.createElement("li");
      li.classList.add("user-item");
      li.innerHTML = `${u.name} → 
        <select onchange="changeVote('${k}', this.value)">
          <option value="evet" ${u.choice==='evet'?'selected':''}>Evet</option>
          <option value="hayir" ${u.choice==='hayir'?'selected':''}>Hayır</option>
        </select>
        <span class="time">${u.time}</span>
        <button class="delete" onclick="deleteVote('${k}')">Sil</button>`;
      userListEl.appendChild(li);
    });
    evetCountEl.textContent = evet;
    hayirCountEl.textContent = hayir;
    if(voteChart) voteChart.destroy();
    voteChart = new Chart(document.getElementById("voteChart").getContext("2d"), {
      type:'doughnut',
      data:{labels:['Evet','Hayır'], datasets:[{data:[evet, hayir], backgroundColor:['#22c55e','#ef4444'], borderWidth:1}]},
      options:{plugins:{legend:{position:'bottom'}}}
    });
  });
}

function deleteVote(k){ db.ref('votes/'+k).remove(); }
function changeVote(k,val){
  const now = new Date().toLocaleString("tr-TR");
  db.ref('votes/'+k).update({choice: val, time: now});
}

// Cursor
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{cursor.style.left=e.clientX+"px"; cursor.style.top=e.clientY+"px";});
document.addEventListener("mousedown",()=>{cursor.style.transform="translate(-50%,-50%) scale(1.5)";});
document.addEventListener("mouseup",()=>{cursor.style.transform="translate(-50%,-50%) scale(1)";});
</script>
</body>
</html>
